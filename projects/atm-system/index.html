<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Banking System | Noverson Gabito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="atm-container">
    <div class="atm-machine">
      <div class="atm-header">
        <i class="fas fa-university"></i>
        <span>NOVA BANK ATM</span>
        <i class="fas fa-microchip"></i>
      </div>
      
      <!-- Screen Display -->
      <div class="atm-screen" id="screen">
        <div class="screen-content" id="screenContent">
          <div class="welcome-screen">
            <i class="fas fa-credit-card" style="font-size: 3rem; color: #2c7da0;"></i>
            <h2>Welcome to Nova Bank</h2>
            <p>Please enter your 4-digit PIN to continue</p>
            <div class="pin-input-area">
              <input type="password" id="pinInput" maxlength="4" placeholder="****" class="pin-field">
              <button id="unlockBtn" class="atm-btn-primary">Unlock <i class="fas fa-arrow-right"></i></button>
            </div>
            <p class="demo-hint"><i class="fas fa-info-circle"></i> Demo PIN: <strong>1234</strong></p>
          </div>
        </div>
      </div>
      
      <!-- Keypad -->
      <div class="atm-keypad">
        <div class="keypad-row">
          <button class="key-btn" data-value="1">1</button>
          <button class="key-btn" data-value="2">2</button>
          <button class="key-btn" data-value="3">3</button>
        </div>
        <div class="keypad-row">
          <button class="key-btn" data-value="4">4</button>
          <button class="key-btn" data-value="5">5</button>
          <button class="key-btn" data-value="6">6</button>
        </div>
        <div class="keypad-row">
          <button class="key-btn" data-value="7">7</button>
          <button class="key-btn" data-value="8">8</button>
          <button class="key-btn" data-value="9">9</button>
        </div>
        <div class="keypad-row">
          <button class="key-btn clear-btn" data-action="clear"><i class="fas fa-backspace"></i></button>
          <button class="key-btn" data-value="0">0</button>
          <button class="key-btn enter-btn" data-action="enter"><i class="fas fa-check"></i></button>
        </div>
      </div>
      
      <!-- Action Buttons -->
      <div class="atm-actions">
        <button class="action-btn" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        <button class="action-btn back-btn" id="backBtn" style="display: none;"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
      
      <div class="atm-footer">
        <span><i class="far fa-clock"></i> 24/7 Banking</span>
        <span><i class="fas fa-shield-alt"></i> Secure Transaction</span>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
